<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bean: "#3b2416",
            mocha: "#6b4328",
            crema: "#f6e7d2",
            latte: "#ead2b3",
            roast: "#1f130c",
            caramel: "#c47a3a",
            foam: "#fff9f1"
          },
          boxShadow: {
            coffee: "0 30px 80px rgba(46, 28, 17, 0.22)"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-roast via-bean to-mocha px-4 py-6 text-foam sm:px-6 sm:py-10">
  <main class="mx-auto flex min-h-[calc(100vh-3rem)] max-w-3xl items-center sm:min-h-[calc(100vh-5rem)]">
    <section class="w-full rounded-[1.75rem] border border-white/10 bg-white/5 p-4 shadow-coffee backdrop-blur sm:rounded-[2rem] sm:p-6 md:p-10">
      <div class="rounded-[1.25rem] bg-gradient-to-br from-mocha to-bean p-5 text-white sm:rounded-[1.5rem] sm:p-6">
        <p class="text-xs font-bold uppercase tracking-[0.24em] text-crema/80 sm:text-sm sm:tracking-[0.3em]">Payment Cancelled</p>
        <h1 class="mt-3 text-3xl font-black sm:text-4xl md:text-5xl">Support was not completed</h1>
        <p class="mt-4 max-w-2xl text-sm leading-6 text-crema/90 sm:leading-7 md:text-base">
          The eSewa payment was cancelled, so no payment was completed.
        </p>
      </div>

      <div class="mt-5 flex flex-col gap-3 sm:mt-6 sm:flex-row">
        <button
          id="retryButton"
          type="button"
          class="inline-flex w-full items-center justify-center rounded-full bg-caramel px-6 py-3 text-sm font-bold uppercase tracking-[0.16em] text-white transition hover:bg-[#b76e31] sm:w-auto sm:tracking-[0.18em]"
        >
          Try Again
        </button>
        <a
          href="/"
          class="inline-flex w-full items-center justify-center rounded-full border border-crema/30 px-6 py-3 text-sm font-bold uppercase tracking-[0.16em] text-crema transition hover:bg-white/10 sm:w-auto sm:tracking-[0.18em]"
        >
          Back to Buy Me a Coffee
        </a>
      </div>

      <p id="status" class="mt-4 min-h-6 text-sm text-crema/80"></p>
    </section>
  </main>

  <script>
    const retryButton = document.getElementById("retryButton");
    const statusEl = document.getElementById("status");
    const urlParams = new URLSearchParams(window.location.search);
    const purchaseId = urlParams.get("purchaseId");

    retryButton.addEventListener("click", async () => {
      if (!purchaseId) {
        statusEl.textContent = "Could not find the cancelled payment to retry.";
        return;
      }

      retryButton.disabled = true;
      retryButton.classList.add("opacity-70", "cursor-wait");
      statusEl.textContent = "Reopening eSewa...";

      try {
        const response = await fetch(`/retry-esewa/${encodeURIComponent(purchaseId)}`);
        const data = await response.json();

        if (!data.success) {
          statusEl.textContent = data.message || "Could not retry the payment.";
          retryButton.disabled = false;
          retryButton.classList.remove("opacity-70", "cursor-wait");
          return;
        }

        const { payment, supportData, esewaFormUrl, callbackUrls } = data;
        const formEl = document.createElement("form");
        formEl.method = "POST";
        formEl.action = esewaFormUrl;

        const fields = {
          amount: supportData.amount,
          tax_amount: 0,
          total_amount: supportData.amount,
          transaction_uuid: supportData._id,
          product_code: payment.product_code,
          product_service_charge: 0,
          product_delivery_charge: 0,
          success_url: callbackUrls.success_url,
          failure_url: callbackUrls.failure_url,
          signed_field_names: payment.signed_field_names,
          signature: payment.signature
        };

        Object.entries(fields).forEach(([key, value]) => {
          const input = document.createElement("input");
          input.type = "hidden";
          input.name = key;
          input.value = value;
          formEl.appendChild(input);
        });

        document.body.appendChild(formEl);
        formEl.submit();
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Something went wrong while retrying the payment.";
        retryButton.disabled = false;
        retryButton.classList.remove("opacity-70", "cursor-wait");
      }
    });
  </script>
</body>
</html>
