<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks for the Coffee</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bean: "#3b2416",
            mocha: "#6b4328",
            crema: "#f6e7d2",
            latte: "#ead2b3",
            roast: "#1f130c",
            caramel: "#c47a3a",
            foam: "#fff9f1"
          },
          boxShadow: {
            coffee: "0 30px 80px rgba(46, 28, 17, 0.22)"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-roast via-bean to-mocha px-4 py-6 text-foam sm:px-6 sm:py-10">
  <main class="mx-auto flex min-h-[calc(100vh-3rem)] max-w-3xl items-center sm:min-h-[calc(100vh-5rem)]">
    <section class="w-full rounded-[1.75rem] border border-white/10 bg-white/5 p-4 shadow-coffee backdrop-blur sm:rounded-[2rem] sm:p-6 md:p-10">
      <div class="rounded-[1.25rem] bg-gradient-to-br from-caramel to-mocha p-5 text-white sm:rounded-[1.5rem] sm:p-6">
        <p class="text-xs font-bold uppercase tracking-[0.24em] text-crema/80 sm:text-sm sm:tracking-[0.3em]">Payment Complete</p>
        <h1 class="mt-3 text-3xl font-black sm:text-4xl md:text-5xl">Thanks for the coffee</h1>
        <p class="mt-4 max-w-2xl text-sm leading-6 text-crema/90 sm:leading-7 md:text-base">
          Your support means a lot. I am verifying the payment details below.
        </p>
      </div>

      <div id="details" class="mt-5 rounded-[1.25rem] bg-foam p-4 text-bean sm:mt-6 sm:rounded-[1.5rem] sm:p-6">
        Checking payment status...
      </div>

      <a
        href="/"
        class="mt-5 inline-flex w-full items-center justify-center rounded-full border border-crema/30 px-5 py-3 text-sm font-bold uppercase tracking-[0.16em] text-crema transition hover:bg-white/10 sm:mt-6 sm:w-auto sm:tracking-[0.18em]"
      >
        Send Another Coffee
      </a>
    </section>
  </main>

  <script>
    async function loadPaymentData() {
      const urlParams = new URLSearchParams(window.location.search);
      const data = urlParams.get("data");
      const detailsDiv = document.getElementById("details");

      if (!data) {
        detailsDiv.textContent = "No payment data was received from eSewa.";
        return;
      }

      try {
        const response = await fetch(`/complete-payment?data=${encodeURIComponent(data)}`);
        const resData = await response.json();

        if (!resData.success) {
          detailsDiv.textContent = "Payment could not be verified.";
          return;
        }

        const payment = resData.paymentData;
        const support = resData.support;

        detailsDiv.innerHTML = `
          <div class="grid gap-4 md:grid-cols-2">
            <div class="rounded-3xl bg-latte/60 p-4">
              <p class="text-xs font-bold uppercase tracking-[0.2em] text-mocha/70">Supporter</p>
              <p class="mt-2 text-xl font-black">${support.donorName || "Anonymous"}</p>
            </div>
            <div class="rounded-3xl bg-latte/60 p-4">
              <p class="text-xs font-bold uppercase tracking-[0.2em] text-mocha/70">Amount Paid</p>
              <p class="mt-2 text-xl font-black">Rs. ${payment.amount}</p>
            </div>
            <div class="rounded-3xl bg-latte/60 p-4">
              <p class="text-xs font-bold uppercase tracking-[0.2em] text-mocha/70">Transaction ID</p>
              <p class="mt-2 break-all text-sm font-semibold">${payment.transactionId}</p>
            </div>
            <div class="rounded-3xl bg-latte/60 p-4">
              <p class="text-xs font-bold uppercase tracking-[0.2em] text-mocha/70">Payment Method</p>
              <p class="mt-2 text-sm font-semibold uppercase">${payment.paymentGateway}</p>
            </div>
          </div>
          <div class="mt-4 rounded-3xl bg-latte/60 p-4">
            <p class="text-xs font-bold uppercase tracking-[0.2em] text-mocha/70">Date</p>
            <p class="mt-2 text-sm font-semibold">${new Date(payment.paymentDate).toLocaleString()}</p>
          </div>
          <div class="mt-4 rounded-3xl bg-latte/60 p-4">
            <p class="text-xs font-bold uppercase tracking-[0.2em] text-mocha/70">Message</p>
            <p class="mt-2 text-sm leading-7">${support.message || "No message left."}</p>
          </div>
        `;
      } catch (error) {
        console.error(error);
        detailsDiv.textContent = "There was a problem loading the payment details.";
      }
    }

    loadPaymentData();
  </script>
</body>
</html>
